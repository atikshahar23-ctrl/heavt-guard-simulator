openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Crypto Arbitrage Scanner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: crypto
    description: Crypto market data and arbitrage scanning
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /crypto/binance:
    get:
      operationId: getBinanceData
      tags: [crypto]
      summary: Get Binance Futures data for a single asset
      description: Returns current mark price and funding rate for a given symbol
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
            default: BTCUSDT
          required: false
          description: Trading symbol (e.g. BTCUSDT, ETHUSDT)
      responses:
        "200":
          description: Binance futures data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceData"
        "502":
          description: Failed to fetch from Binance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/binance/multi:
    get:
      operationId: getBinanceMulti
      tags: [crypto]
      summary: Get Binance Futures data for multiple assets
      description: Returns current mark price and funding rate for BTC, ETH, SOL, and BNB
      responses:
        "200":
          description: Array of Binance futures data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BinanceData"
        "502":
          description: Failed to fetch from Binance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/polymarket:
    get:
      operationId: getPolymarketMarkets
      tags: [crypto]
      summary: Get active Polymarket crypto markets
      description: Returns active crypto prediction markets from Polymarket
      parameters:
        - in: query
          name: asset
          schema:
            type: string
            enum: [BTC, ETH, SOL, BNB, ALL]
            default: ALL
          required: false
          description: Filter by crypto asset
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: Free-text search within question text
      responses:
        "200":
          description: List of active crypto markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolymarketMarket"
        "502":
          description: Failed to fetch from Polymarket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/scan:
    get:
      operationId: getScanResults
      tags: [crypto]
      summary: Run full arbitrage/sentiment scan
      description: Fetches Binance and Polymarket data, cross-references them, and returns arbitrage signals
      parameters:
        - in: query
          name: asset
          schema:
            type: string
            enum: [BTC, ETH, SOL, BNB, ALL]
            default: ALL
          required: false
          description: Asset(s) to scan
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: Free-text filter on market questions
      responses:
        "200":
          description: Scan results with signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/recommendations:
    get:
      operationId: getRecommendations
      tags: [crypto]
      summary: Get top-ranked arbitrage recommendations
      description: Returns the top actionable signals ranked by severity and confidence across all assets
      responses:
        "200":
          description: Ranked recommendations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    BinanceData:
      type: object
      required:
        - symbol
        - asset
        - markPrice
        - fundingRate
        - fundingRatePercent
        - fetchedAt
      properties:
        symbol:
          type: string
        asset:
          type: string
          description: Short asset name e.g. BTC
        markPrice:
          type: number
        fundingRate:
          type: number
        fundingRatePercent:
          type: number
        fetchedAt:
          type: string

    PolymarketMarket:
      type: object
      required:
        - question
        - yesPrice
        - noPrice
        - yesProbabilityPercent
        - targetPrice
        - conditionId
        - active
        - assetTag
      properties:
        conditionId:
          type: string
        question:
          type: string
        yesPrice:
          type: number
        noPrice:
          type: number
        yesProbabilityPercent:
          type: number
        targetPrice:
          type: ["number", "null"]
        active:
          type: boolean
        endDate:
          type: ["string", "null"]
        volume:
          type: ["number", "null"]
        assetTag:
          type: string
          description: Which asset this market relates to e.g. BTC, ETH

    ArbitrageSignal:
      type: object
      required:
        - type
        - message
        - severity
      properties:
        type:
          type: string
          enum: [overbought_sentiment, underpriced_probability, neutral]
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high]

    MarketAnalysis:
      type: object
      required:
        - market
        - distanceToTargetPercent
        - signal
        - binanceSymbol
        - markPrice
      properties:
        market:
          $ref: "#/components/schemas/PolymarketMarket"
        distanceToTargetPercent:
          type: number
        signal:
          $ref: "#/components/schemas/ArbitrageSignal"
        binanceSymbol:
          type: string
        markPrice:
          type: number

    ScanResult:
      type: object
      required:
        - binanceAssets
        - markets
        - scannedAt
        - totalMarkets
        - signalCounts
      properties:
        binanceAssets:
          type: array
          items:
            $ref: "#/components/schemas/BinanceData"
        markets:
          type: array
          items:
            $ref: "#/components/schemas/MarketAnalysis"
        scannedAt:
          type: string
        totalMarkets:
          type: integer
        signalCounts:
          $ref: "#/components/schemas/SignalCounts"

    SignalCounts:
      type: object
      required:
        - overbought
        - underpriced
        - neutral
      properties:
        overbought:
          type: integer
        underpriced:
          type: integer
        neutral:
          type: integer

    Recommendation:
      type: object
      required:
        - rank
        - action
        - rationale
        - market
        - signal
        - binanceSymbol
        - markPrice
        - distanceToTargetPercent
        - confidence
        - edge
        - potentialReturn
        - entryPrice
      properties:
        rank:
          type: integer
        action:
          type: string
          enum: [BUY_YES, BUY_NO, WATCH]
        rationale:
          type: string
        market:
          $ref: "#/components/schemas/PolymarketMarket"
        signal:
          $ref: "#/components/schemas/ArbitrageSignal"
        binanceSymbol:
          type: string
        markPrice:
          type: number
        distanceToTargetPercent:
          type: number
        confidence:
          type: string
          enum: [HIGH, MEDIUM, LOW]
        edge:
          type: number
          description: Probability mispricing in percentage points — how far off the crowd is from rational probability
        potentialReturn:
          type: number
          description: Return multiplier if position is correct (e.g. 8.5 means 8.5x your entry)
        entryPrice:
          type: number
          description: The price to pay per contract (yesPrice for BUY_YES, noPrice for BUY_NO)
