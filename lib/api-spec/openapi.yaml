openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Crypto Arbitrage Scanner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: crypto
    description: Crypto market data and arbitrage scanning
  - name: markets
    description: All-categories Polymarket browser
  - name: stocks
    description: Stock and index market data and recommendations
  - name: user
    description: User state and profile
  - name: binance-user
    description: User-managed Binance API credentials (read-only)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /crypto/binance:
    get:
      operationId: getBinanceData
      tags: [crypto]
      summary: Get Binance Futures data for a single asset
      description: Returns current mark price and funding rate for a given symbol
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
            default: BTCUSDT
          required: false
          description: Trading symbol (e.g. BTCUSDT, ETHUSDT)
      responses:
        "200":
          description: Binance futures data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceData"
        "502":
          description: Failed to fetch from Binance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/binance/multi:
    get:
      operationId: getBinanceMulti
      tags: [crypto]
      summary: Get Binance Futures data for multiple assets
      description: Returns current mark price and funding rate for BTC, ETH, SOL, and BNB
      responses:
        "200":
          description: Array of Binance futures data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BinanceData"
        "502":
          description: Failed to fetch from Binance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/polymarket:
    get:
      operationId: getPolymarketMarkets
      tags: [crypto]
      summary: Get active Polymarket crypto markets
      description: Returns active crypto prediction markets from Polymarket
      parameters:
        - in: query
          name: asset
          schema:
            type: string
            enum: [BTC, ETH, SOL, BNB, ALL]
            default: ALL
          required: false
          description: Filter by crypto asset
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: Free-text search within question text
      responses:
        "200":
          description: List of active crypto markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolymarketMarket"
        "502":
          description: Failed to fetch from Polymarket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /polymarket/price-history:
    get:
      operationId: getPolymarketPriceHistory
      tags: [crypto]
      summary: Get probability price history for a Polymarket market
      description: Proxies the Polymarket CLOB prices-history endpoint (free, no auth required). Returns time-series probability data for a market token.
      parameters:
        - name: marketId
          in: query
          required: true
          schema:
            type: string
          description: Polymarket condition ID or YES token ID
        - name: interval
          in: query
          required: false
          schema:
            type: string
            enum: [1h, 6h, 1d]
            default: 1d
          description: Candlestick interval for the price history
        - name: startTs
          in: query
          required: false
          schema:
            type: integer
          description: Start timestamp (Unix seconds)
        - name: endTs
          in: query
          required: false
          schema:
            type: integer
          description: End timestamp (Unix seconds)
      responses:
        "200":
          description: Probability price history points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolymarketPricePoint"
        "400":
          description: Missing or invalid marketId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to fetch price history from Polymarket CLOB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/scan:
    get:
      operationId: getScanResults
      tags: [crypto]
      summary: Run full arbitrage/sentiment scan
      description: Fetches Binance and Polymarket data, cross-references them, and returns arbitrage signals
      parameters:
        - in: query
          name: asset
          schema:
            type: string
            enum: [BTC, ETH, SOL, BNB, ALL]
            default: ALL
          required: false
          description: Asset(s) to scan
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: Free-text filter on market questions
      responses:
        "200":
          description: Scan results with signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /markets/all:
    get:
      operationId: getAllMarkets
      tags: [markets]
      summary: Browse all Polymarket markets (all categories)
      description: Returns all active Polymarket prediction markets across all categories — crypto, politics, sports, economy, tech, and more
      parameters:
        - in: query
          name: category
          schema:
            type: string
            enum: [ALL, CRYPTO, POLITICS, SPORTS, ECONOMY, TECH, OTHER]
            default: ALL
          required: false
          description: Filter by category
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: Free-text search within question text
      responses:
        "200":
          description: List of all active markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolymarketMarket"
        "502":
          description: Failed to fetch from Polymarket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks:
    get:
      operationId: getStocks
      tags: [stocks]
      summary: Get live stock and index quotes
      description: Returns live quotes for a curated universe of ~100 stocks (tech, energy, resources, large caps) plus common indices/ETFs
      responses:
        "200":
          description: List of stock quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockQuote"
        "502":
          description: Failed to fetch stock data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks/klines:
    get:
      operationId: getStockKlines
      tags: [stocks]
      summary: Get OHLC candles for a single stock
      description: Server-side proxy of Yahoo Finance chart data (avoids browser CORS) returning candlesticks for one symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
          description: Stock ticker, e.g. AAPL
        - name: range
          in: query
          required: false
          schema:
            type: string
          description: "Yahoo range, e.g. 1d, 5d, 1mo, 6mo, 1y (default 1mo)"
        - name: interval
          in: query
          required: false
          schema:
            type: string
          description: "Yahoo interval, e.g. 5m, 15m, 1h, 1d (default 1d)"
      responses:
        "200":
          description: OHLC candles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockCandle"
        "400":
          description: Missing or invalid symbol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to fetch candles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks/search:
    get:
      operationId: getStockSearch
      tags: [stocks]
      summary: Search the entire real stock market by symbol or name
      description: Free Yahoo Finance search proxy that resolves ANY tradable symbol (equities, ETFs, indices) beyond the curated universe, so any real-market instrument can be charted and traded
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query — ticker or company name, e.g. "tesla" or "nvda"
      responses:
        "200":
          description: Matching tradable symbols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSearchResult"
        "400":
          description: Missing or invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to search stocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks/recommendations:
    get:
      operationId: getStockRecommendations
      tags: [stocks]
      summary: Get ranked stock trade recommendations
      description: Returns momentum-based BUY/SELL recommendations across the stock universe, ranked by conviction
      responses:
        "200":
          description: Ranked stock recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockRecommendation"
        "502":
          description: Failed to build recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks/influencers:
    get:
      operationId: getInfluencerSignals
      tags: [stocks]
      summary: Get Smart-Money influencer signals
      description: Tracks mega-influencers (Trump, Musk, etc.) via free Google News RSS, scores headline sentiment, and maps it to LONG/SHORT stock signals
      responses:
        "200":
          description: Influencer-driven stock signals ranked by confidence
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InfluencerSignal"
        "502":
          description: Failed to build influencer signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/recommendations:
    get:
      operationId: getRecommendations
      tags: [crypto]
      summary: Get top-ranked arbitrage recommendations
      description: Returns the top actionable signals ranked by severity and confidence across all assets
      responses:
        "200":
          description: Ranked recommendations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/movers:
    get:
      operationId: getMarketMovers
      tags: [crypto]
      summary: Get market-moving intelligence
      description: Aggregates Fear & Greed index, top gainers/losers, trending coins, and latest crypto news headlines
      responses:
        "200":
          description: Aggregated market movers data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketMovers"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/overview:
    get:
      operationId: getMarketOverview
      tags: [crypto]
      summary: Get the live top-50 coin universe
      description: Returns the top USDT pairs by 24h quote volume (stablecoins and leveraged tokens excluded) from the Binance public mirror
      responses:
        "200":
          description: Live coin overview
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoinTicker"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/scalp:
    get:
      operationId: getScalpSignals
      tags: [crypto]
      summary: Get short-timeframe scalp signals
      description: Computes RSI, EMA(9/21), ATR and swing structure on the 15m timeframe for top coins, returning ranked LONG/SHORT/NEUTRAL signals with entry, stop-loss and take-profit
      responses:
        "200":
          description: Ranked scalp signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScalpSignal"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/momentum:
    get:
      operationId: getMomentumCoins
      tags: [crypto]
      summary: Get momentum / surge radar
      description: Scans the liquid coin universe on the 5m timeframe for relative-volume spikes, rate-of-change acceleration, green streaks and range breakouts to surface coins flying up now or building toward a surge (meme-style runners)
      responses:
        "200":
          description: Ranked momentum coins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MomentumCoin"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crypto/shortterm:
    get:
      operationId: getShortTermMarkets
      tags: [crypto]
      summary: Get short-term crypto prediction markets
      description: Returns Polymarket crypto markets resolving within 48 hours, sorted soonest-first
      responses:
        "200":
          description: Near-term crypto markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolymarketMarket"
        "502":
          description: Failed to fetch external data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /funding/opportunities:
    get:
      operationId: getFundingOpportunities
      tags: [funding]
      summary: Ranked cash-and-carry funding opportunities
      description: >-
        Returns delta-neutral funding (cash-and-carry) opportunities across the
        major-coin universe, combining Binance (8h) and Hyperliquid (1h) funding,
        ranked by an educational viability score. Paper/educational only.
      responses:
        "200":
          description: Ranked funding opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FundingOpportunity"
        "502":
          description: Failed to fetch funding data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /funding/check:
    get:
      operationId: checkFundingAsset
      tags: [funding]
      summary: On-demand funding check for a single asset
      description: >-
        Returns the live funding snapshot, viability verdict, bilingual analysis,
        and recent funding history for one asset.
      parameters:
        - in: query
          name: asset
          schema:
            type: string
          required: true
          description: Asset symbol (e.g. BTC, ETH, SOL)
      responses:
        "200":
          description: Funding check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundingAssetCheck"
        "400":
          description: Invalid asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to fetch funding data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /funding/history:
    get:
      operationId: getFundingHistory
      tags: [funding]
      summary: Deep funding-rate history for one asset
      description: >-
        Returns paginated hourly Hyperliquid funding history for one asset over
        the requested lookback (up to 1 year, as far back as the venue has data),
        plus summary statistics (average / min / max annualized funding and the
        share of positive intervals) for the professional history chart.
      parameters:
        - in: query
          name: asset
          schema:
            type: string
          required: true
          description: Asset symbol (e.g. BTC, ETH, SOL)
        - in: query
          name: days
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
          required: false
          description: Lookback window in days (default 30, max 365)
      responses:
        "200":
          description: Funding history with summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundingHistory"
        "400":
          description: Invalid params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to fetch funding history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /funding/backtest:
    get:
      operationId: backtestFundingAsset
      tags: [funding]
      summary: Educational funding backtest over recent history
      description: >-
        Replays recent hourly funding history for one asset and reports the
        accrued carry, drawdown of the funding stream, and an educational verdict.
        Past funding never guarantees future carry.
      parameters:
        - in: query
          name: asset
          schema:
            type: string
          required: true
          description: Asset symbol (e.g. BTC, ETH, SOL)
        - in: query
          name: hours
          schema:
            type: integer
            default: 168
            minimum: 1
            maximum: 720
          required: false
          description: Lookback window in hours (default 168 = 7 days)
      responses:
        "200":
          description: Funding backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundingBacktest"
        "400":
          description: Invalid asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to run backtest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user-state:
    get:
      operationId: getUserState
      tags: [user]
      summary: Get all persisted state slots for the signed-in user
      description: >
        Returns every saved state slot (wallets, autotrader, favorites,
        onboarding, performance) for the authenticated Clerk user. Requires a signed-in
        session; returns 401 otherwise.
      responses:
        "200":
          description: All state slots for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserStateEntry"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user-state/{slot}:
    put:
      operationId: putUserState
      tags: [user]
      summary: Upsert a single state slot with optimistic concurrency
      description: >
        Saves the client-owned JSON blob for one slot. The server treats `data`
        as opaque. Pass `baseVersion` (the version this edit was based on, 0 for
        a brand-new slot); the write only applies when the stored version still
        matches, otherwise the current server snapshot is returned with 409.
      parameters:
        - in: path
          name: slot
          required: true
          schema:
            type: string
            enum: [wallets, autotrader, favorites, onboarding, performance]
          description: Which state slot to write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserStateInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStateWriteResult"
        "400":
          description: Invalid slot or body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Version conflict — returns the current server snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStateEntry"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/binance/credentials:
    get:
      operationId: getBinanceCredentials
      tags: [binance-user]
      summary: Check if the user has connected a Binance API key
      description: Returns the masked key and connection status. 401 if not signed in.
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceCredentialsStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: putBinanceCredentials
      tags: [binance-user]
      summary: Save and encrypt Binance API credentials
      description: Encrypts the key and secret using the server-side SESSION_SECRET and stores them in user_state. The server validates the credentials with a lightweight test call before saving.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BinanceCredentialsInput"
      responses:
        "200":
          description: Saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceCredentialsStatus"
        "400":
          description: Invalid input or Binance rejected the test call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBinanceCredentials
      tags: [binance-user]
      summary: Remove stored Binance API credentials
      description: Deletes the encrypted credentials from the server. This is a hard delete — no recovery.
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceCredentialsStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/binance/balance:
    get:
      operationId: getBinanceBalance
      tags: [binance-user]
      summary: Get the user's real Binance account balance
      description: Fetches the live spot account balance from Binance using the stored API key. Returns total USDT and per-asset breakdown.
      responses:
        "200":
          description: Balance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceBalance"
        "400":
          description: No credentials stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Binance API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/binance/orders:
    get:
      operationId: getBinanceOrders
      tags: [binance-user]
      summary: Get the user's open orders on Binance
      description: Fetches open spot orders from Binance using the stored API key.
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceOrders"
        "400":
          description: No credentials stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Binance API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/report:
    post:
      operationId: reportWallet
      tags: [social]
      summary: Report the signed-in user's active-wallet value and display name
      description: >
        Upserts the caller's profile row with their privacy-safe display name and
        latest active-wallet value (cash + open position value). The user is
        derived from the Clerk session — never from the body. Implausible values
        are ignored (sane server-side bounds); the display name is still saved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportWalletInput"
      responses:
        "200":
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialProfile"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [social]
      summary: Top traders leaderboard plus the caller's own rank
      description: >
        Returns the top 10 users ranked by reported active-wallet value, with a
        privacy-safe display name, and the caller's own rank/value (even when
        outside the top 10).
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/daily-reward:
    get:
      operationId: getDailyReward
      tags: [social]
      summary: Daily-reward claim status
      description: >
        Reports whether the daily login reward is claimable for the caller, based
        on the Asia/Jerusalem calendar day.
      responses:
        "200":
          description: Daily-reward status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/daily-reward/claim:
    post:
      operationId: claimDailyReward
      tags: [social]
      summary: Claim today's daily login reward
      description: >
        Records today's claim (Asia/Jerusalem day) and adds the reward to the
        caller's unclaimed-credits ledger. A second claim on the same Israel day
        is rejected (returns claimed=false, alreadyClaimed=true).
      responses:
        "200":
          description: Claim result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardClaim"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/referral:
    get:
      operationId: getReferral
      tags: [social]
      summary: The caller's referral code/link and referral count
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/referral/redeem:
    post:
      operationId: redeemReferral
      tags: [social]
      summary: Redeem a referral code as a brand-new user
      description: >
        Validates the referrer exists, it is not self-referral, and the caller
        hasn't already redeemed; then grants a one-time bonus to both the new
        user and the referrer (added to each unclaimed-credits ledger).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemReferralInput"
      responses:
        "200":
          description: Redemption result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemReferralResult"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/credits:
    get:
      operationId: getCredits
      tags: [social]
      summary: The caller's current unclaimed-credit balance
      responses:
        "200":
          description: Unclaimed credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credits"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /social/credits/ack:
    post:
      operationId: ackCredits
      tags: [social]
      summary: Acknowledge applied credits (decrement the ledger)
      description: >
        After the client applies drained credits to the browser wallet it acks
        the exact amount; the server decrements the ledger by that amount
        (clamped at 0), so concurrently-earned credits are preserved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AckCreditsInput"
      responses:
        "200":
          description: Remaining credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credits"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Whether the caller is the software manager
      description: >
        Returns { isAdmin } for any authenticated user (false for everyone but
        the single software-manager account). The client uses this to decide
        whether to render admin tooling; the server is the source of truth.
      responses:
        "200":
          description: Admin status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminUsers
      tags: [admin]
      summary: Every user ranked by wallet value (admin only)
      description: >
        Returns all users with their leaderboard name (and any admin override)
        and reported wallet value, ranked by wallet value. No per-user state
        blobs — fetch those lazily via /admin/users/{userId}/state. Admin only.
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsers"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the software manager
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/state:
    get:
      operationId: adminUserState
      tags: [admin]
      summary: One user's wallets / trader / performance blobs (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User state blobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserState"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the software manager
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/rename:
    post:
      operationId: adminRename
      tags: [admin]
      summary: Set or clear a user's leaderboard display name (admin only)
      description: >
        Sets an admin override for the user's leaderboard name. An empty name
        clears the override (reverts to the user's own self-reported name). The
        override survives the user's periodic self-report. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRenameInput"
      responses:
        "200":
          description: Updated name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRenameResult"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the software manager
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ReportWalletInput:
      type: object
      required:
        - displayName
        - walletValue
      properties:
        displayName:
          type: string
          description: Privacy-safe display name (never an email).
          minLength: 1
          maxLength: 40
        walletValue:
          type: number
          description: Active-wallet value (cash + open position value), in paper dollars.

    SocialProfile:
      type: object
      required:
        - displayName
        - walletValue
        - referralCode
      properties:
        displayName:
          type: string
        walletValue:
          type: number
        referralCode:
          type: string

    LeaderboardEntry:
      type: object
      required:
        - rank
        - displayName
        - walletValue
        - isSelf
      properties:
        rank:
          type: integer
        displayName:
          type: string
        walletValue:
          type: number
        isSelf:
          type: boolean

    Leaderboard:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        self:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/LeaderboardEntry"
          description: The caller's own rank/value, present even when outside top 10.

    DailyRewardStatus:
      type: object
      required:
        - claimable
        - amount
      properties:
        claimable:
          type: boolean
        amount:
          type: number
          description: Reward amount in paper dollars.
        lastClaimDate:
          type: string
          nullable: true
          description: Asia/Jerusalem day (YYYY-MM-DD) of the last claim.

    DailyRewardClaim:
      type: object
      required:
        - claimed
        - alreadyClaimed
        - amount
      properties:
        claimed:
          type: boolean
        alreadyClaimed:
          type: boolean
        amount:
          type: number

    ReferralInfo:
      type: object
      required:
        - code
        - link
        - referralCount
      properties:
        code:
          type: string
        link:
          type: string
          description: Full sign-up link carrying the referral code.
        referralCount:
          type: integer
          description: How many users this user has successfully referred.

    RedeemReferralInput:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 64

    RedeemReferralResult:
      type: object
      required:
        - redeemed
        - bonus
      properties:
        redeemed:
          type: boolean
        bonus:
          type: number
          description: Bonus added to the caller's ledger (0 when not redeemed).
        reason:
          type: string
          nullable: true
          description: Why redemption was rejected, when redeemed=false.

    Credits:
      type: object
      required:
        - unclaimedCredits
      properties:
        unclaimedCredits:
          type: number

    AckCreditsInput:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          description: Amount of credits the client has applied to the wallet.

    UserStateData:
      description: >
        Opaque client-owned JSON state. The server never interprets the shape;
        it is fully owned by the frontend contexts. May be an object or array.

    UserStateEntry:
      type: object
      required:
        - slot
        - data
        - version
        - updatedAt
      properties:
        slot:
          type: string
        data:
          $ref: "#/components/schemas/UserStateData"
        version:
          type: integer
        updatedAt:
          type: string

    UserStateInput:
      type: object
      required:
        - data
        - baseVersion
      properties:
        data:
          $ref: "#/components/schemas/UserStateData"
        baseVersion:
          type: integer
          minimum: 0
          description: Version this edit was based on (0 for a brand-new slot)

    UserStateWriteResult:
      type: object
      required:
        - slot
        - version
        - updatedAt
      properties:
        slot:
          type: string
        version:
          type: integer
        updatedAt:
          type: string

    AdminMe:
      type: object
      required:
        - isAdmin
      properties:
        isAdmin:
          type: boolean

    AdminUser:
      type: object
      required:
        - rank
        - userId
        - displayName
        - effectiveName
        - walletValue
      properties:
        rank:
          type: integer
        userId:
          type: string
        displayName:
          type: string
          description: The user's own self-reported leaderboard name.
        displayNameOverride:
          type: string
          nullable: true
          description: Admin-set name override (null when unset).
        effectiveName:
          type: string
          description: The name actually shown (override if set, else displayName).
        walletValue:
          type: number
        walletReportedAt:
          type: string
          nullable: true
        referralCode:
          type: string
          nullable: true
        referredBy:
          type: string
          nullable: true
        createdAt:
          type: string

    AdminUsers:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"

    AdminUserState:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
        wallets:
          $ref: "#/components/schemas/UserStateData"
        autotrader:
          $ref: "#/components/schemas/UserStateData"
        performance:
          $ref: "#/components/schemas/UserStateData"

    AdminRenameInput:
      type: object
      required:
        - userId
        - displayName
      properties:
        userId:
          type: string
          minLength: 1
        displayName:
          type: string
          maxLength: 40
          description: New name; empty string clears the override.

    AdminRenameResult:
      type: object
      required:
        - userId
        - displayName
        - effectiveName
      properties:
        userId:
          type: string
        displayName:
          type: string
        displayNameOverride:
          type: string
          nullable: true
        effectiveName:
          type: string

    BinanceData:
      type: object
      required:
        - symbol
        - asset
        - markPrice
        - fundingRate
        - fundingRatePercent
        - fetchedAt
      properties:
        symbol:
          type: string
        asset:
          type: string
          description: Short asset name e.g. BTC
        markPrice:
          type: number
        fundingRate:
          type: number
        fundingRatePercent:
          type: number
        fetchedAt:
          type: string

    PolymarketPricePoint:
      type: object
      required:
        - t
        - p
      properties:
        t:
          type: integer
          description: Unix timestamp in seconds
        p:
          type: string
          description: Probability price as a decimal string (e.g. "0.72" = 72%)

    PolymarketMarket:
      type: object
      required:
        - question
        - yesPrice
        - noPrice
        - yesProbabilityPercent
        - targetPrice
        - conditionId
        - active
        - assetTag
        - category
      properties:
        conditionId:
          type: string
        question:
          type: string
        yesPrice:
          type: number
        noPrice:
          type: number
        yesProbabilityPercent:
          type: number
        targetPrice:
          type: ["number", "null"]
        active:
          type: boolean
        endDate:
          type: ["string", "null"]
        volume:
          type: ["number", "null"]
        volume24hr:
          type: ["number", "null"]
          description: 24-hour trading volume in USDT
        assetTag:
          type: string
          description: Which asset this market relates to e.g. BTC, ETH
        category:
          type: string
          description: "Broad category: CRYPTO, POLITICS, SPORTS, ECONOMY, TECH, OTHER"
        slug:
          type: ["string", "null"]
          description: Polymarket market slug for direct URL linking
        eventSlug:
          type: ["string", "null"]
          description: Parent event slug — the correct slug for public polymarket.com/event URLs
        oneDayPriceChange:
          type: ["number", "null"]
          description: 24-hour change in YES probability (price points, e.g. 0.05 = +5pt)
        liquidity:
          type: ["number", "null"]
          description: Market liquidity in USD
        spread:
          type: ["number", "null"]
          description: Bid-ask spread (lower = tighter, more liquid)
        competitive:
          type: ["number", "null"]
          description: Polymarket competitiveness score 0-1 (higher = more two-sided action)
        tokenId:
          type: ["string", "null"]
          description: CLOB YES-token ID required by the Polymarket price-history API for probability charts

    ArbitrageSignal:
      type: object
      required:
        - type
        - message
        - severity
      properties:
        type:
          type: string
          enum: [overbought_sentiment, underpriced_probability, neutral]
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high]

    MarketAnalysis:
      type: object
      required:
        - market
        - distanceToTargetPercent
        - signal
        - binanceSymbol
        - markPrice
      properties:
        market:
          $ref: "#/components/schemas/PolymarketMarket"
        distanceToTargetPercent:
          type: number
        signal:
          $ref: "#/components/schemas/ArbitrageSignal"
        binanceSymbol:
          type: string
        markPrice:
          type: number

    ScanResult:
      type: object
      required:
        - binanceAssets
        - markets
        - scannedAt
        - totalMarkets
        - signalCounts
      properties:
        binanceAssets:
          type: array
          items:
            $ref: "#/components/schemas/BinanceData"
        markets:
          type: array
          items:
            $ref: "#/components/schemas/MarketAnalysis"
        scannedAt:
          type: string
        totalMarkets:
          type: integer
        signalCounts:
          $ref: "#/components/schemas/SignalCounts"

    SignalCounts:
      type: object
      required:
        - overbought
        - underpriced
        - neutral
      properties:
        overbought:
          type: integer
        underpriced:
          type: integer
        neutral:
          type: integer

    Recommendation:
      type: object
      required:
        - rank
        - action
        - rationale
        - market
        - signal
        - binanceSymbol
        - markPrice
        - distanceToTargetPercent
        - confidence
        - edge
        - potentialReturn
        - entryPrice
      properties:
        rank:
          type: integer
        action:
          type: string
          enum: [BUY_YES, BUY_NO, WATCH]
        rationale:
          type: string
        market:
          $ref: "#/components/schemas/PolymarketMarket"
        signal:
          $ref: "#/components/schemas/ArbitrageSignal"
        binanceSymbol:
          type: string
        markPrice:
          type: number
        distanceToTargetPercent:
          type: number
        confidence:
          type: string
          enum: [HIGH, MEDIUM, LOW]
        edge:
          type: number
          description: Probability mispricing in percentage points — how far off the crowd is from rational probability
        potentialReturn:
          type: number
          description: Return multiplier if position is correct (e.g. 8.5 means 8.5x your entry)
        entryPrice:
          type: number
          description: The price to pay per contract (yesPrice for BUY_YES, noPrice for BUY_NO)

    StockQuote:
      type: object
      required:
        - symbol
        - name
        - category
        - price
        - previousClose
        - change
        - changePercent
        - currency
        - tradingViewSymbol
        - fetchedAt
      properties:
        symbol:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [TECH, ENERGY, RESOURCES, LARGE_CAP, INDEX]
        price:
          type: number
        previousClose:
          type: number
        change:
          type: number
        changePercent:
          type: number
        dayHigh:
          type: ["number", "null"]
        dayLow:
          type: ["number", "null"]
        monthHigh:
          type: ["number", "null"]
        monthLow:
          type: ["number", "null"]
        momentum5dPercent:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        currency:
          type: string
        tradingViewSymbol:
          type: string
          description: Symbol formatted for TradingView links (dot notation for class shares)
        fetchedAt:
          type: string
        shortInterest:
          type: ["number", "null"]
          description: Short interest (shares short). Null if unavailable.
        shortRatio:
          type: ["number", "null"]
          description: Short ratio = days to cover. Null if unavailable.
        shortPercentOfFloat:
          type: ["number", "null"]
          description: Short interest as % of float. Null if unavailable.

    StockCandle:
      type: object
      required:
        - time
        - open
        - high
        - low
        - close
      properties:
        time:
          type: integer
          description: Candle open time in epoch seconds
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: ["number", "null"]

    StockRecommendation:
      type: object
      required:
        - rank
        - symbol
        - name
        - category
        - action
        - confidence
        - rationale
        - price
        - changePercent
        - momentum5dPercent
        - rangePositionPercent
        - tradingViewSymbol
      properties:
        rank:
          type: integer
        symbol:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [TECH, ENERGY, RESOURCES, LARGE_CAP, INDEX]
        action:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: string
          enum: [HIGH, MEDIUM, LOW]
        rationale:
          type: string
        price:
          type: number
        changePercent:
          type: number
        momentum5dPercent:
          type: number
        rangePositionPercent:
          type: number
          description: Where the price sits within its 1-month range (0 = monthly low, 100 = monthly high)
        tradingViewSymbol:
          type: string

    StockSearchResult:
      type: object
      required:
        - symbol
        - name
        - exchange
        - type
      properties:
        symbol:
          type: string
        name:
          type: string
        exchange:
          type: string
        type:
          type: string
          description: Instrument type, e.g. EQUITY, ETF, INDEX

    InfluencerSignal:
      type: object
      required:
        - influencer
        - ticker
        - name
        - headline
        - url
        - source
        - sentiment
        - direction
        - confidence
        - horizon
        - publishedAt
      properties:
        influencer:
          type: string
        ticker:
          type: string
        name:
          type: string
          description: Company / instrument name for the ticker
        headline:
          type: string
        url:
          type: string
        source:
          type: string
        sentiment:
          type: number
          description: Aggregate headline sentiment from -1 (bearish) to 1 (bullish)
        direction:
          type: string
          enum: [LONG, SHORT]
        confidence:
          type: number
          description: Conviction score 0-100
        horizon:
          type: string
          enum: [SHORT, LONG]
        publishedAt:
          type: string

    MoverCoin:
      type: object
      required:
        - symbol
        - price
        - changePercent
      properties:
        symbol:
          type: string
        price:
          type: number
        changePercent:
          type: number
        quoteVolume:
          type: ["number", "null"]

    TrendingCoin:
      type: object
      required:
        - name
        - symbol
      properties:
        name:
          type: string
        symbol:
          type: string
        marketCapRank:
          type: ["integer", "null"]
        thumb:
          type: ["string", "null"]

    NewsItem:
      type: object
      required:
        - title
        - source
        - url
        - publishedAt
      properties:
        title:
          type: string
        source:
          type: string
        url:
          type: string
        publishedAt:
          type: string

    FearGreed:
      type: object
      required:
        - value
        - classification
      properties:
        value:
          type: integer
        classification:
          type: string

    MarketMovers:
      type: object
      required:
        - fetchedAt
        - gainers
        - losers
        - trending
        - news
      properties:
        fetchedAt:
          type: string
        fearGreed:
          oneOf:
            - $ref: "#/components/schemas/FearGreed"
            - type: "null"
        gainers:
          type: array
          items:
            $ref: "#/components/schemas/MoverCoin"
        losers:
          type: array
          items:
            $ref: "#/components/schemas/MoverCoin"
        trending:
          type: array
          items:
            $ref: "#/components/schemas/TrendingCoin"
        news:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"

    CoinTicker:
      type: object
      required:
        - symbol
        - asset
        - price
        - changePercent
        - high24h
        - low24h
        - quoteVolume
        - trades
      properties:
        symbol:
          type: string
        asset:
          type: string
        price:
          type: number
        changePercent:
          type: number
        high24h:
          type: number
        low24h:
          type: number
        quoteVolume:
          type: number
        trades:
          type: number

    ScalpSignal:
      type: object
      required:
        - symbol
        - asset
        - direction
        - confidence
        - score
        - price
        - changePercent
        - rsi
        - emaFast
        - emaSlow
        - atr
        - entry
        - stopLoss
        - takeProfit
        - riskReward
        - reasons
      properties:
        symbol:
          type: string
        asset:
