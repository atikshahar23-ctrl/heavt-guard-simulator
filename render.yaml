services:
  - type: web
    name: poly-market-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --config.minimumReleaseAge=0 && pnpm run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
